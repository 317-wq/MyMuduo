<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMuduo Chat</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <header>
            <h1>💬 MyMuduo Chat</h1>
            <div id="user-info" style="display:none;">
                <img id="user-avatar" src="/img/default.svg" width="32" height="32" alt="avatar">
                <span id="user-name"></span>
                <button id="btn-logout">登出</button>
            </div>
        </header>

        <main>
            <!-- 登录 / 注册面板 -->
            <div id="auth-panel">
                <div class="tabs">
                    <button class="tab active" data-tab="login">登录</button>
                    <button class="tab" data-tab="register">注册</button>
                </div>

                <!-- 登录表单 -->
                <form id="login-form" class="auth-form">
                    <input type="email" id="login-email" placeholder="邮箱" required>
                    <input type="password" id="login-password" placeholder="密码" required>
                    <button type="submit">登录</button>
                </form>

                <!-- 注册表单 -->
                <form id="register-form" class="auth-form" style="display:none;">
                    <input type="email" id="reg-email" placeholder="邮箱" required>
                    <button type="button" id="btn-send-code">发送验证码</button>
                    <input type="text" id="reg-code" placeholder="验证码" required>
                    <input type="text" id="reg-username" placeholder="用户名" required>
                    <input type="password" id="reg-password" placeholder="密码" required>
                    <button type="submit">注册</button>
                </form>

                <div id="auth-message"></div>
            </div>

            <!-- 聊天面板 -->
            <div id="chat-panel" style="display:none;">
                <div id="online-users">
                    <h3>在线用户</h3>
                    <ul id="user-list"></ul>
                </div>
                <div id="chat-area">
                    <div id="messages"></div>
                    <form id="chat-form">
                        <input type="text" id="chat-input" placeholder="输入消息..." autocomplete="off">
                        <button type="submit">发送</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
