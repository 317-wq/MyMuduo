<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyChat - 注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            padding: 48px 40px;
            width: 420px;
            max-width: 90vw;
        }
        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 8px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #11998e;
            box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.15);
        }
        .password-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .password-strength {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .error {
            background: #fff5f5;
            color: #e53e3e;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid #fed7d7;
        }
        .footer {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 24px;
        }
        .footer a {
            color: #11998e;
            text-decoration: none;
            font-weight: 500;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .terms {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
        }
        .terms a {
            color: #11998e;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">✨</div>
        <h1>创建账号</h1>
        <p class="subtitle">注册 MyChat 账号，加入聊天</p>
        <div id="errorBox"></div>
        <form method="POST" action="/register" id="registerForm" onsubmit="return validateForm()">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username"
                       placeholder="4-20 位字母、数字或下划线" required autofocus
                       pattern="[a-zA-Z0-9_]{4,20}"
                       autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password"
                       placeholder="至少 6 位，含字母和数字" required
                       minlength="6"
                       autocomplete="new-password"
                       oninput="updateStrength()">
                <div class="password-hint">至少 6 位字符</div>
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar" style="width:0;"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       placeholder="请再次输入密码" required
                       autocomplete="new-password">
            </div>
            <button type="submit" id="submitBtn">注 册</button>
        </form>
        <div class="terms">
            注册即表示同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
        </div>
        <div class="footer">
            已有账号？<a href="/login">立即登录</a>
        </div>
    </div>

    <script>
        function updateStrength() {
            const pwd = document.getElementById('password').value;
            const bar = document.getElementById('strengthBar');
            let score = 0;
            if (pwd.length >= 6) score++;
            if (pwd.length >= 10) score++;
            if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
            if (/\d/.test(pwd)) score++;
            if (/[^a-zA-Z0-9]/.test(pwd)) score++;

            const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];
            const colors = ['#e0e0e0', '#e53e3e', '#ed8936', '#ecc94b', '#48bb78', '#38a169'];
            bar.style.width = widths[score];
            bar.style.background = colors[score];
        }

        function validateForm() {
            const pwd = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const box = document.getElementById('errorBox');

            if (pwd !== confirm) {
                box.innerHTML = '<div class="error">两次输入的密码不一致</div>';
                return false;
            }
            return true;
        }

        // 显示服务端错误
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        if (error) {
            const box = document.getElementById('errorBox');
            const messages = {
                'empty': '请填写所有必填字段',
                'password_mismatch': '两次输入的密码不一致',
                'username_taken': '该用户名已被注册',
                'weak_password': '密码强度不足，至少需要 6 位字符',
                'invalid_username': '用户名格式不正确（4-20 位字母、数字或下划线）'
            };
            const msg = messages[error] || decodeURIComponent(error);
            box.innerHTML = `<div class="error">${msg}</div>`;
        }
    </script>
</body>
</html>
